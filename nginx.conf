user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

# Optimizing file descriptor limits for high concurrency
worker_rlimit_nofile 40960;

events {
    worker_connections 20480;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # General optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer size optimizations to handle large headers and payloads
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Enable Gzip compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Define backend upstream clustered pool
    upstream neurova_backend_servers {
        # Least connections load balancing strategy
        least_conn;

        # Directs to Node clustering local port
        server 127.0.0.1:5050;
        
        # Keepalive persistent socket pool
        keepalive 100;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Compress response buffers
        gzip on;

        # Serve frontend static assets (React bundle)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Enable browser caching for assets
            location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
                expires 1M;
                access_log off;
                add_header Cache-Control "public, no-transform";
            }
        }

        # Reverse proxy to backend API servers
        location /api {
            proxy_pass http://neurova_backend_servers;
            proxy_http_version 1.1;
            
            # Setup persistent keep-alive connections
            proxy_set_header Connection "";
            
            # Forward real visitor IP and host info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Disable proxy buffering for server-sent events if used
            proxy_buffering off;
        }
    }
}
